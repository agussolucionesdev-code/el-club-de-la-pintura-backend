name: CI

# Gate every push and pull request: nothing merges or deploys if typecheck,
# Prisma generation, or the integration test suite fails.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the integration tests. The setup guard points the
    # suite at TEST_DATABASE_URL, never at the production Neon database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: el_club_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/el_club_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/el_club_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck (build)
        run: npx tsc --noEmit

      - name: Sync schema to test database
        run: npx prisma db push --skip-generate

      - name: Run integration tests
        run: npm test
