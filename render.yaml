services:
  - type: web
    name: el-club-pintura-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # IMPORTANT: Set JWT_SECRET to a strong, stable secret in Render's
      # environment secrets. Do NOT use generateValue — it rotates on every
      # deploy, logging out all active users.
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ADMIN_ONBOARD_SECRET
        generateValue: true
      # Required for initial admin user creation on first deploy:
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Use 'none' for cross-origin Vercel+Render deployment, 'lax' for same-domain:
      - key: COOKIE_SAME_SITE
        value: none
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
